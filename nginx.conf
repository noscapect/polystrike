server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Ensure ES module files (.mjs) are served as JavaScript
    types {
        text/html html;
        text/css css;
        text/javascript js mjs;
        application/json json;
        image/svg+xml svg;
    }

    location / {
        # Serve existing files, otherwise fall back to index.html
        try_files $uri $uri/ /index.html;
    }
}
